<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>数秘神託 - Hado Edition</title>
<style>
/* 既存のスタイルを継承 */
body{ margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center; background:radial-gradient(circle at center,#0b0b10 0%,#000 70%); color:#eee;font-family:"Hiragino Mincho ProN",serif; }
.container{text-align:center;width:100%;max-width:900px; padding: 20px;}
.title{color:#d4af37;letter-spacing:0.6rem;font-size:2.6rem;margin-bottom:30px;}
button, .action-btn{ background:none;color:#d4af37;border:1px solid #d4af37; padding:14px 48px;font-size:1.2rem;cursor:pointer; letter-spacing:0.3rem;text-decoration:none; display:inline-block; margin-top: 20px;}
button:disabled{opacity:.4;cursor:not-allowed;}
.drums{display:flex;justify-content:center;gap:20px;margin:40px 0;}
.drum{ width:80px;height:100px;border-radius:15px; background:rgba(255,255,255,0.05); display:flex;align-items:center;justify-content:center; font-size:2.5rem; box-shadow:0 0 20px rgba(212,175,55,0.15); }
.gold{color:#ffd700;text-shadow:0 0 14px rgba(255,215,0,.9);}
.result-area { margin-top: 30px; display: none; }
#fortuneImg { width: 100%; max-width: 500px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3); margin: 20px auto; display: none; }
#fortuneText { text-align: left; line-height: 1.8; color: #ccc; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; white-space: pre-wrap; font-size: 0.95rem; }
.loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite;}
@keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #d4af37; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #d4af37, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #d4af37, 1em 0 0 #d4af37; } }
</style>
</head>
<body>
<div class="container">
    <div class="title">数秘神託</div>
    <button id="drawBtn" onclick="start()">数秘を導く</button>

    <div class="drums">
        <div class="drum" id="d1">-</div><div class="drum" id="d2">-</div><div class="drum" id="d3">-</div>
        <div class="drum" id="d4">-</div><div class="drum" id="d5">-</div><div class="drum" id="d6">-</div>
        <div class="drum" id="d7">-</div><div class="drum" id="d8">-</div><div class="drum" id="d9">-</div>
    </div>

    <div id="statusNotice" class="notice"></div>

    <div id="resultArea" class="result-area">
        <div id="loadingMsg" class="loading-dots" style="color:#d4af37;">天の声を聴いています</div>
        <img id="fortuneImg" alt="神託の画">
        <div id="fortuneText"></div>
        <button onclick="location.reload()" class="action-btn">再び封印する</button>
    </div>
</div>

<script>
let allDigits = [];
const apiURL = '/api/fortune';

function roll(el, duration, done) {
    let start = performance.now();
    function tick(now) {
        if (now - start < duration) {
            el.innerText = Math.floor(Math.random() * 10);
            requestAnimationFrame(tick);
        } else {
            const n = Math.floor(Math.random() * 10);
            el.innerHTML = [3,6,9].includes(n) ? `<span class="gold">${n}</span>` : n;
            done(n);
        }
    }
    requestAnimationFrame(tick);
}

function start() {
    document.getElementById("drawBtn").disabled = true;
    allDigits = [];
    let completed = 0;
    const drums = [1,2,3,4,5,6,7,8,9].map(i => document.getElementById(`d${i}`));
    
    drums.forEach((el, i) => {
        setTimeout(() => {
            roll(el, 1500 + (i * 200), (n) => {
                allDigits[i] = n;
                completed++;
                if (completed === 9) getFortune();
            });
        }, i * 100);
    });
}

async function getFortune() {
    const resultArea = document.getElementById("resultArea");
    resultArea.style.display = "block";
    
    try {
        const res = await fetch(apiURL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                date: new Date().toLocaleString(),
                number: allDigits.join("")
            })
        });
        const data = await res.json();
        
        document.getElementById("loadingMsg").style.display = "none";
        const img = document.getElementById("fortuneImg");
        img.src = data.imageUrl;
        img.style.display = "block";
        document.getElementById("fortuneText").innerText = data.text;
    } catch (e) {
        document.getElementById("fortuneText").innerText = "通信に失敗しました。";
    }
}
</script>
</body>
</html>
